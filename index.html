<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>May you be Blessed ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: monospace;
  text-align: center;
  color: white;
  transition: background 1.5s ease;
}

/* CANVAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  display: none;
  z-index: 0;
}

/* GLOW */
#bgGlow {
  position: fixed;
  width: 100%;
  height: 100%;
  display: none;
  pointer-events: none;
  background: radial-gradient(circle, rgba(255,215,0,0.2), transparent 70%);
  animation: glow 4s infinite alternate;
}
@keyframes glow {
  from { opacity: 0.4; }
  to { opacity: 0.9; }
}

/* SECTIONS */
.section {
  position: absolute;
  width: 100%;
  top: 40%;
  z-index: 2;
}
.hidden { display: none; }

/* POPUP */
#boxContent {
  border: 2px solid #00ff00;
  padding: 25px;
  color: #00ff00;
  background: rgba(0,0,0,0.7);
  box-shadow: 0 0 20px #00ff00;
  display: inline-block;
}

/* BUTTONS */
button {
  background: transparent;
  border: 2px solid #00ff00;
  color: #00ff00;
  padding: 10px 20px;
  margin: 10px;
  cursor: pointer;
}
#noBtn { position: absolute; }

/* PHOTO */
#photo {
  width: 260px;
  border-radius: 20px;
  border: 4px solid gold;
  box-shadow: 0 0 25px gold, 0 0 40px blue;
}

/* MESSAGE (FIXED) */
#message {
  color: black;
  font-weight: bold;
  font-size: 18px;
  margin-top: 15px;
  background: linear-gradient(to right, #ffffff, #fceabb);
  display: inline-block;
  padding: 8px 15px;
  border-radius: 10px;
  box-shadow: 0 0 10px gold;
}

/* BALLOONS */
.balloon {
  position: absolute;
  bottom: -100px;
  width: 20px;
  height: 30px;
  border-radius: 50%;
  animation: floatUp 5s linear forwards;
}
@keyframes floatUp {
  to { transform: translateY(-120vh); }
}

/* FIREWORK */
.firework {
  position: absolute;
  width: 6px;
  height: 6px;
  border-radius: 50%;
}
</style>
</head>

<body>

<div id="bgGlow"></div>

<canvas id="matrix"></canvas>
<canvas id="romanceCanvas"></canvas>

<audio id="music" src="music.mp3"></audio>

<div id="start" class="section">
  <h2><a href="#" onclick="start()">Tap Here 😊</a></h2>
</div>

<div id="loading" class="section hidden">
  <p id="code" style="color:#00ff00;"></p>
</div>

<div id="box" class="section hidden">
  <div id="boxContent">
    <h2>WARNING! System Authorization Request</h2>
    <button onclick="yes()">YES</button>
    <button id="noBtn" onmouseover="moveNo()">NO</button>
  </div>
</div>

<div id="final" class="section hidden">
  <h2 style="color:gold;">✨ IF BEAUTY IS A PERSON THEN THAT'S YOU ❤️ ✨</h2>
  <img id="photo" src="photo1.JPG"><br><br>
  <p id="message"></p>
</div>

<script>
const startDiv = document.getElementById("start");
const loadingDiv = document.getElementById("loading");
const boxDiv = document.getElementById("box");
const finalDiv = document.getElementById("final");
const code = document.getElementById("code");
const noBtn = document.getElementById("noBtn");
const photo = document.getElementById("photo");
const message = document.getElementById("message");

/* MATRIX */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let drops = Array(Math.floor(canvas.width/14)).fill(1);
let running = false;

function drawMatrix(){
  if(!running) return;
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#0F0";
  ctx.font="14px monospace";

  drops.forEach((y,i)=>{
    ctx.fillText(Math.random()>0.5?"1":"0", i*14, y*14);
    if(y*14>canvas.height && Math.random()>0.975) drops[i]=0;
    drops[i]++;
  });
  requestAnimationFrame(drawMatrix);
}

/* ROMANCE BG */
const romanceCanvas = document.getElementById("romanceCanvas");
const rctx = romanceCanvas.getContext("2d");
romanceCanvas.width = innerWidth;
romanceCanvas.height = innerHeight;

let stars=[], hearts=[], romanceRunning=false;

for(let i=0;i<80;i++){
  stars.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight});
}
for(let i=0;i<25;i++){
  hearts.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight});
}

function drawRomance(){
  if(!romanceRunning) return;

  rctx.clearRect(0,0,innerWidth,innerHeight);

  rctx.fillStyle="white";
  stars.forEach(s=>{
    rctx.beginPath();
    rctx.arc(s.x,s.y,1.5,0,Math.PI*2);
    rctx.fill();
    s.y+=0.3;
    if(s.y>innerHeight) s.y=0;
  });

  hearts.forEach(h=>{
    rctx.font="18px Arial";
    rctx.fillStyle="rgba(255,100,150,0.8)";
    rctx.fillText("❤",h.x,h.y);
    h.y+=0.7;
    if(h.y>innerHeight) h.y=0;
  });

  requestAnimationFrame(drawRomance);
}

/* START */
function start(){
  startDiv.classList.add("hidden");
  loadingDiv.classList.remove("hidden");
  canvas.style.display="block";
  running=true;
  drawMatrix();

  let txt="Initializing...\nDecrypting...\nAccessing heart...\n";
  let i=0;
  function type(){
    if(i<txt.length){
      code.innerHTML+=txt[i++];
      setTimeout(type,40);
    } else {
      setTimeout(()=>{
        loadingDiv.classList.add("hidden");
        boxDiv.classList.remove("hidden");
      },1000);
    }
  }
  type();
}

function moveNo(){
  noBtn.style.top=Math.random()*innerHeight+"px";
  noBtn.style.left=Math.random()*innerWidth+"px";
}

/* YES */
function yes(){
  running=false;
  canvas.style.display="none";

  romanceCanvas.style.display="block";
  romanceRunning=true;
  drawRomance();

  boxDiv.classList.add("hidden");
  finalDiv.classList.remove("hidden");

  document.getElementById("bgGlow").style.display="block";

  document.body.style.background=`
  radial-gradient(circle at top, rgba(0,100,255,0.3), transparent 70%),
  radial-gradient(circle at bottom, rgba(255,215,0,0.3), transparent 70%),
  linear-gradient(to bottom,#000814,#001d3d)
  `;

  playMusic();
  launchParty();
  launchFireworks();
  typeMessage();
  slideshow();
}

/* MUSIC */
function playMusic(){
  let m=document.getElementById("music");
  m.volume=0;
  m.play();
  let fade=setInterval(()=>{
    if(m.volume<1) m.volume+=0.05;
    else clearInterval(fade);
  },200);
}

/* MESSAGE */
let text="tsk meh hard lo tkt, yu yet u boss eh ❤️";
let ti=0;
function typeMessage(){
  if(ti<text.length){
    message.innerHTML+=text[ti++];
    setTimeout(typeMessage,80);
  }
}

/* SLIDESHOW */
let imgs=["photo1.JPG","photo2.jpg","photo3.JPG"];
let idx=0;
function slideshow(){
  setInterval(()=>{
    idx=(idx+1)%imgs.length;
    photo.src=imgs[idx];
  },3000);
}

/* BALLOONS */
function launchParty(){
  let colors=["gold","#007BFF","#3399ff"];
  for(let i=0;i<20;i++){
    let b=document.createElement("div");
    b.className="balloon";
    b.style.left=Math.random()*100+"vw";
    b.style.background=colors[Math.floor(Math.random()*colors.length)];
    document.body.appendChild(b);
  }
}

/* FIREWORKS */
function launchFireworks(){
  setInterval(()=>{
    explode(Math.random()*innerWidth, Math.random()*innerHeight/2);
  },600);
}

function explode(x,y){
  for(let i=0;i<25;i++){
    let p=document.createElement("div");
    p.className="firework";
    p.style.background="hsl("+Math.random()*360+",100%,50%)";
    document.body.appendChild(p);

    let a=Math.random()*2*Math.PI;
    let d=Math.random()*80;

    let start=null;
    function anim(t){
      if(!start) start=t;
      let pr=t-start;
      p.style.transform=`translate(${x+Math.cos(a)*d}px,${y+Math.sin(a)*d}px)`;
      p.style.opacity=1-pr/600;
      if(pr<600) requestAnimationFrame(anim);
      else p.remove();
    }
    requestAnimationFrame(anim);
  }
}
</script>

</body>
</html>
